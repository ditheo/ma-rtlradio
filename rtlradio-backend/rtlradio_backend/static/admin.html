<!doctype html>
<html lang="el" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RTL Radio Admin</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --bg:#f7f6f2; --surface:#f9f8f5; --surface2:#fbfbf9; --border:#d4d1ca;
      --text:#28251d; --muted:#7a7974; --primary:#01696f; --primary2:#cedcd8;
      --ok:#437a22; --err:#a12c7b; --radius:14px; --shadow:0 4px 12px rgba(0,0,0,.08);
    }
    [data-theme="dark"] {
      --bg:#171614; --surface:#1c1b19; --surface2:#201f1d; --border:#393836;
      --text:#cdccca; --muted:#797876; --primary:#4f98a3; --primary2:#313b3b;
      --ok:#6daa45; --err:#d163a7; --shadow:0 4px 12px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box} body{margin:0;font-family:'Satoshi',sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px}
    .logo{display:flex;align-items:center;gap:12px}.mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary2))}
    .title{font-size:32px;font-weight:700;line-height:1.05}.muted{color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .card h2{margin:0 0 14px;font-size:22px}
    .field{display:grid;gap:8px;margin-bottom:14px}
    label{font-size:14px;font-weight:700}
    input,select,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font:inherit}
    textarea{min-height:130px;resize:vertical}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    button{border:0;border-radius:10px;padding:12px 14px;font-weight:700;cursor:pointer}
    .primary{background:var(--primary);color:#fff}.secondary{background:var(--primary2);color:var(--text)}
    .status{display:none;padding:12px 14px;border-radius:10px;font-size:14px;margin-bottom:18px}
    .status.show{display:block}.status.ok{background:color-mix(in oklab, var(--ok) 14%, var(--surface));}.status.err{background:color-mix(in oklab, var(--err) 14%, var(--surface));}
    .list{display:grid;gap:10px}.item{padding:12px;border-radius:10px;background:var(--surface2);border:1px solid var(--border)}
    .item strong{display:block}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.title{font-size:26px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">
      <div class="mark"></div>
      <div>
        <div class="title">RTL Radio Admin</div>
        <div class="muted">FM catalog, DAB stations και favorites από μία σελίδα.</div>
      </div>
    </div>
    <button class="secondary" id="themeBtn" type="button">Dark mode</button>
  </div>

  <div id="status" class="status"></div>

  <div class="grid">
    <section class="card">
      <h2>Backend</h2>
      <div class="field">
        <label for="baseUrl">Base URL</label>
        <input id="baseUrl" value="" placeholder="π.χ. http://10.100.0.249:7070">
      </div>
      <div class="row">
        <button class="secondary" id="loadStationsBtn" type="button">Load stations</button>
        <button class="secondary" id="loadFavoritesBtn" type="button">Load favorites</button>
      </div>
    </section>

    <section class="card">
      <h2>Add FM station</h2>
      <div class="field">
        <label for="fmName">FM name</label>
        <input id="fmName" placeholder="π.χ. Best Radio">
      </div>
      <div class="field">
        <label for="fmFreq">Frequency</label>
        <input id="fmFreq" type="number" step="0.1" placeholder="π.χ. 105.8">
      </div>
      <div class="row">
        <button class="primary" id="addFmBtn" type="button">POST /stations/fm</button>
      </div>
    </section>
  </div>

  <div class="grid" style="margin-top:20px">
    <section class="card">
      <h2>Create favorite</h2>
      <div class="field">
        <label for="alias">Alias</label>
        <input id="alias" placeholder="π.χ. Voice / Best FM / News">
      </div>
      <div class="field">
        <label for="stationSelect">Station</label>
        <select id="stationSelect">
          <option value="">Διάλεξε station_id</option>
        </select>
      </div>
      <div class="field">
        <label for="stationId">station_id</label>
        <input id="stationId" placeholder="π.χ. dab:5A:0x1005 ή fm:105.8">
      </div>
      <div class="field">
        <label for="jsonBody">JSON body</label>
        <textarea id="jsonBody">{
  "alias": "",
  "station_id": ""
}</textarea>
      </div>
      <div class="row">
        <button class="primary" id="postFavoriteBtn" type="button">POST /favorites</button>
        <button class="secondary" id="syncJsonBtn" type="button">Sync JSON</button>
      </div>
    </section>

    <section class="card">
      <h2>DAB scan</h2>
      <div class="field">
        <label for="dabBlock">Block</label>
        <input id="dabBlock" value="5A" placeholder="π.χ. 5A">
      </div>
      <div class="row">
        <button class="primary" id="scanDabBtn" type="button">POST /dab/scan/{block}</button>
      </div>
    </section>
  </div>

  <div class="grid" style="margin-top:20px">
    <section class="card">
      <h2>Stations</h2>
      <div id="stationsList" class="list"></div>
    </section>

    <section class="card">
      <h2>Favorites</h2>
      <div id="favoritesList" class="list"></div>
    </section>
  </div>
</div>

<script>
const state = { stations: [], favorites: [] };
const $ = (id) => document.getElementById(id);

function getBaseUrl() {
  const raw = $('baseUrl').value.trim();
  if (raw) return raw.replace(/\/$/, '');
  return window.location.origin;
}

function showStatus(message, ok = true) {
  const el = $('status');
  el.className = 'status show ' + (ok ? 'ok' : 'err');
  el.textContent = message;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function syncJson() {
  const payload = {
    alias: $('alias').value.trim(),
    station_id: $('stationId').value.trim()
  };
  $('jsonBody').value = JSON.stringify(payload, null, 2);
}

function renderStations() {
  const wrap = $('stationsList');
  wrap.innerHTML = '';
  if (!state.stations.length) {
    wrap.innerHTML = '<div class="muted">Δεν υπάρχουν stations ακόμα.</div>';
    return;
  }

  state.stations.forEach((st) => {
    const el = document.createElement('div');
    el.className = 'item';
    el.innerHTML = `
      <strong>${escapeHtml(st.name || st.id)}</strong>
      <div class="mono">${escapeHtml(st.id || '')}</div>
      <div class="muted">${escapeHtml(st.stream_path || '')}</div>
    `;
    el.addEventListener('click', () => {
      $('stationId').value = st.id || '';
      if (!$('alias').value.trim()) $('alias').value = st.name || '';
      syncJson();
    });
    wrap.appendChild(el);
  });

  const select = $('stationSelect');
  select.innerHTML = '<option value="">Διάλεξε station_id</option>';
  state.stations.forEach((st) => {
    const opt = document.createElement('option');
    opt.value = st.id || '';
    opt.textContent = `${st.name || st.id} — ${st.id || ''}`;
    select.appendChild(opt);
  });
}

function renderFavorites() {
  const wrap = $('favoritesList');
  wrap.innerHTML = '';
  if (!state.favorites.length) {
    wrap.innerHTML = '<div class="muted">Δεν υπάρχουν favorites ακόμα.</div>';
    return;
  }

  state.favorites.forEach((fav) => {
    const el = document.createElement('div');
    el.className = 'item';
    el.innerHTML = `
      <strong>${escapeHtml(fav.alias || '')}</strong>
      <div class="mono">${escapeHtml(fav.station_id || '')}</div>
      <div class="muted">${escapeHtml(fav.target_path || '')}</div>
    `;
    wrap.appendChild(el);
  });
}

async function loadStations() {
  const res = await fetch(getBaseUrl() + '/stations');
  const data = await res.json();
  state.stations = [...(data.dab || []), ...(data.fm || [])];
  renderStations();
  showStatus(`Loaded ${state.stations.length} stations.`);
}

async function loadFavorites() {
  const res = await fetch(getBaseUrl() + '/favorites');
  const data = await res.json();
  state.favorites = data.items || [];
  renderFavorites();
  showStatus(`Loaded ${state.favorites.length} favorites.`);
}

async function addFmStation() {
  const payload = {
    name: $('fmName').value.trim(),
    frequency: Number($('fmFreq').value)
  };

  const res = await fetch(getBaseUrl() + '/stations/fm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  const text = await res.text();
  if (!res.ok) {
    showStatus(`FM create failed: ${res.status} ${text}`, false);
    return;
  }

  showStatus(`FM station added: ${text}`);
  await loadStations();
}

async function postFavorite() {
  let payload;
  try {
    payload = JSON.parse($('jsonBody').value);
  } catch {
    showStatus('Το JSON δεν είναι έγκυρο.', false);
    return;
  }

  const res = await fetch(getBaseUrl() + '/favorites', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  const text = await res.text();
  if (!res.ok) {
    showStatus(`POST failed: ${res.status} ${text}`, false);
    return;
  }

  showStatus(`Favorite saved: ${text}`);
  await loadFavorites();
}

async function scanDab() {
  const block = $('dabBlock').value.trim();
  const res = await fetch(getBaseUrl() + '/dab/scan/' + encodeURIComponent(block), {
    method: 'POST'
  });

  const text = await res.text();
  if (!res.ok) {
    showStatus(`DAB scan failed: ${res.status} ${text}`, false);
    return;
  }

  showStatus(`DAB scan completed for block ${block}.`);
  await loadStations();
}

$('syncJsonBtn').addEventListener('click', syncJson);
$('postFavoriteBtn').addEventListener('click', postFavorite);
$('addFmBtn').addEventListener('click', addFmStation);
$('scanDabBtn').addEventListener('click', scanDab);
$('loadStationsBtn').addEventListener('click', loadStations);
$('loadFavoritesBtn').addEventListener('click', loadFavorites);
$('stationSelect').addEventListener('change', (e) => {
  $('stationId').value = e.target.value;
  syncJson();
});
$('alias').addEventListener('input', syncJson);
$('stationId').addEventListener('input', syncJson);

$('themeBtn').addEventListener('click', () => {
  const root = document.documentElement;
  const dark = root.getAttribute('data-theme') === 'dark';
  root.setAttribute('data-theme', dark ? 'light' : 'dark');
  $('themeBtn').textContent = dark ? 'Dark mode' : 'Light mode';
});

$('baseUrl').value = window.location.origin;
loadStations().catch(err => showStatus('Load stations failed: ' + err.message, false));
loadFavorites().catch(err => showStatus('Load favorites failed: ' + err.message, false));
</script>
</body>
</html>
