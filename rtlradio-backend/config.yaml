name: RTL-SDR Radio Backend
version: "0.2.18"
slug: rtlradio_backend
description: "FM/DAB+ radio backend using an RTL-SDR USB dongle, for Music Assistant"
url: "https://github.com/ditheo/ma-rtlradio"
arch:
  - aarch64
  - amd64
init: false
usb: true
privileged:
  - SYS_MODULE
ports:
  7070/tcp: 7070
ports_description:
  7070/tcp: "RTL-SDR Radio Backend API"
options:
  device_serial: ""
  log_level: info
schema:
  device_serial: str
  log_level: "list(trace|debug|info|warning|error|fatal)?"
