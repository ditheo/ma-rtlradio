name: Provider CI

on:
  push:
    branches: [main]
    paths: ["provider/**"]
  pull_request:
    paths: ["provider/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check provider/
